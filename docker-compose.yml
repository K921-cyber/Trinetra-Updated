# ==================== TRINETRA Docker Compose ====================
# Dev:  docker compose up           (uses docker-compose.override.yml for hot-reload)
# Prod: docker compose -f docker-compose.yml up

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:15-alpine
    container_name: trinetra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trinetra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-trinetra}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trinetra -d trinetra"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
        reservations:
          cpus: "0.25"
          memory: "256M"
    security_opt:
      - no-new-privileges:true
    networks:
      - trinetra

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: trinetra-cache
    restart: unless-stopped
    ports:
      - "6380:6379"  # Host port 6380 → internal Redis 6379 (avoids local Memurai conflict)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"
        reservations:
          cpus: "0.1"
          memory: "128M"
    security_opt:
      - no-new-privileges:true
    networks:
      - trinetra

  # ==================== Backend (FastAPI) ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trinetra-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_NAME=TRINETRA OSINT API
      - VERSION=1.0.0
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trinetra}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-trinetra}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost"]}
      - PLUGIN_TIMEOUT=30
      - HIBP_API_KEY=${HIBP_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "512M"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - trinetra

  # ==================== Taskiq Worker ====================
  taskiq-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trinetra-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_NAME=TRINETRA OSINT API
      - VERSION=1.0.0
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-trinetra}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-trinetra}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost"]}
      - PLUGIN_TIMEOUT=30
      - HIBP_API_KEY=${HIBP_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Python is available in the image; checks main process (PID 1) is alive
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "512M"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    command: taskiq worker app.tasks.broker:broker app.tasks.watch_tasks
    networks:
      - trinetra

  # ==================== Frontend (React + Nginx) ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trinetra-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: "256M"
        reservations:
          cpus: "0.1"
          memory: "128M"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Nginx needs NET_BIND_SERVICE to bind to port 80
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    networks:
      - trinetra

volumes:
  postgres_data:
  redis_data:

networks:
  trinetra:
    driver: bridge
